name: Daily Commit Digest

on:
  schedule:
    - cron: '0 20 * * *' # كل يوم 10 مساءً (UTC)
  workflow_dispatch:      # تشغيل يدوي لو احتجت تجرب

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch commits and generate digest
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          pip install requests PyGithub

          python3 << 'EOF'
          import requests
          import json
          import smtplib
          import os
          from datetime import datetime, timezone
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from github import Github

          # ── 1. جيب كل commits النهارده ──────────────────────────────
          g = Github(os.environ["GITHUB_TOKEN"])
          user = g.get_user()
          today = datetime.now(timezone.utc).replace(
              hour=0, minute=0, second=0, microsecond=0
          )

          all_commits = []

          for repo in user.get_repos():
              try:
                  commits = repo.get_commits(author=user.login, since=today)
                  for commit in commits:
                      all_commits.append({
                          "repo": repo.name,
                          "message": commit.commit.message,
                          "sha": commit.sha[:7],
                          "url": commit.html_url,
                          "time": commit.commit.author.date.strftime("%H:%M")
                      })
              except Exception:
                  continue

          if not all_commits:
              print("No commits today. Skipping.")
              exit(0)

          # ── 2. جهز الـ prompt لـ Claude ──────────────────────────────
          commits_text = "\n".join([
              f"[{c['repo']}] {c['time']} — {c['message']} ({c['sha']})"
              for c in all_commits
          ])

          prompt = f"""
          أنت مساعد تقني. فيما يلي commits اليوم من مشاريع Flutter مطور اسمه مصطفى.

          {commits_text}

          اعمل تقرير يومي احترافي بالعربي يشمل:
          1. ملخص عام لليوم
          2. لكل مشروع: ماذا تم بالضبط (features، bug fixes، screens، إلخ)
          3. هل اكتملت feature كاملة؟
          4. أي مشاكل تم حلها أو تفاديها يُستنتج من الـ commits؟
          5. توصية أو ملاحظة سريعة للغد

          اجعل التقرير منظم، مختصر، وعملي.
          """

          # ── 3. بعت لـ Claude API ──────────────────────────────────────
          response = requests.post(
              "https://api.anthropic.com/v1/messages",
              headers={
                  "x-api-key": os.environ["ANTHROPIC_API_KEY"],
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json"
              },
              json={
                  "model": "claude-sonnet-4-20250514",
                  "max_tokens": 1500,
                  "messages": [{"role": "user", "content": prompt}]
              }
          )

          digest = response.json()["content"][0]["text"]

          # ── 4. بعت الـ Email ──────────────────────────────────────────
          date_str = datetime.now().strftime("%d/%m/%Y")

          msg = MIMEMultipart("alternative")
          msg["Subject"] = f"📱 Daily Dev Digest — {date_str}"
          msg["From"] = os.environ["GMAIL_USER"]
          msg["To"] = os.environ["GMAIL_USER"]

          # Plain text version
          msg.attach(MIMEText(digest, "plain", "utf-8"))

          # Send
          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(
                  os.environ["GMAIL_USER"],
                  os.environ["GMAIL_APP_PASSWORD"]
              )
              server.sendmail(
                  os.environ["GMAIL_USER"],
                  os.environ["GMAIL_USER"],
                  msg.as_string()
              )

          print(f"✅ Digest sent successfully! ({len(all_commits)} commits)")
          EOF
