name: Daily Commit Digest

on:
  schedule:
    - cron: '19 0 * * *' # 2:19 AM Egypt time (UTC+2)
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Generate and send daily digest
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          pip install requests PyGithub -q

          python3 << 'EOF'
          import requests
          import os
          import smtplib
          from datetime import datetime, timezone
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          from github import Github

          # ── 1. جيب كل commits النهارده ──────────────────────────────
          g = Github(os.environ["GH_TOKEN"])
          user = g.get_user()
          today = datetime.now(timezone.utc).replace(
              hour=0, minute=0, second=0, microsecond=0
          )

          all_commits = []

          for repo in user.get_repos():
              try:
                  commits = repo.get_commits(author=user.login, since=today)
                  for commit in commits:
                      all_commits.append({
                          "repo": repo.name,
                          "message": commit.commit.message.strip(),
                          "sha": commit.sha[:7],
                          "time": commit.commit.author.date.strftime("%H:%M")
                      })
              except Exception:
                  continue

          if not all_commits:
              print("No commits today. Skipping.")
              exit(0)

          # ── 2. جهز الـ prompt لـ Gemini ──────────────────────────────
          commits_text = "\n".join([
              f"[{c['repo']}] {c['time']} — {c['message']} ({c['sha']})"
              for c in all_commits
          ])

          prompt = f"""
          أنت مساعد تقني. فيما يلي commits اليوم من مشاريع Flutter مطور اسمه مصطفى.

          {commits_text}

          اعمل تقرير يومي احترافي بالعربي يشمل:
          1. ملخص عام لليوم
          2. لكل مشروع: ماذا تم بالضبط (features، bug fixes، screens، إلخ)
          3. هل اكتملت feature كاملة؟
          4. أي مشاكل تم حلها أو تفاديها يُستنتج من الـ commits؟
          5. توصية أو ملاحظة سريعة للغد

          اجعل التقرير منظم، مختصر، وعملي.
          """

          # ── 3. بعت لـ Gemini API ──────────────────────────────────────
          gemini_url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key={os.environ['GEMINI_API_KEY']}"

          response = requests.post(
              gemini_url,
              headers={"Content-Type": "application/json"},
              json={"contents": [{"parts": [{"text": prompt}]}]}
          )

          digest = response.json()["candidates"][0]["content"]["parts"][0]["text"]

          # ── 4. بعت الـ Email ──────────────────────────────────────────
          date_str = datetime.now().strftime("%d/%m/%Y")

          msg = MIMEMultipart("alternative")
          msg["Subject"] = f"📱 Daily Dev Digest — {date_str}"
          msg["From"] = os.environ["GMAIL_USER"]
          msg["To"] = os.environ["GMAIL_USER"]
          msg.attach(MIMEText(digest, "plain", "utf-8"))

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(
                  os.environ["GMAIL_USER"],
                  os.environ["GMAIL_APP_PASSWORD"]
              )
              server.sendmail(
                  os.environ["GMAIL_USER"],
                  os.environ["GMAIL_USER"],
                  msg.as_string()
              )

          print(f"✅ Digest sent! ({len(all_commits)} commits today)")
          EOF
